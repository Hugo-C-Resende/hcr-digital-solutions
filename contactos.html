<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Contactos | HCR Digital Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <div class="logo">
      <img src="logo-hcr.png" alt="HCR Digital Solutions" height="40">
      <span>HCR Digital Solutions</span>
    </div>
  </div>
</header>

<section class="contact-page">
  <div class="container contact-wrapper">

    <!-- FORMULÁRIO -->
    <div class="contact-form-box">
      <h2>Entre em Contacto</h2>
      <p>Preencha o formulário e responderei o mais rapidamente possível.</p>

      <form action="https://formsubmit.co/hugocresende@hotmail.com" method="POST">

        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <label>Nome *</label>
        <input type="text" name="nome" required>

        <label>Email *</label>
        <input type="email" name="email" required>

        <label>Telefone *</label>
        <input type="tel" name="telefone" required>

        <label>Mensagem *</label>
        <textarea name="mensagem" required></textarea>

        <button type="submit" class="btn-primary">Enviar Mensagem</button>
      </form>
    </div>

    <!-- MAPA -->
    <div class="contact-map-box">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2905.351... (COLOCA AQUI O TEU LINK COMPLETO DO GOOGLE MAPS)"
        width="100%" height="100%" style="border:0;" allowfullscreen loading="lazy">
      </iframe>
    </div>

  </div>
</section>

<footer class="footer">
  <div class="container footer-grid">
    <div>
      <p>© HCR Digital Solutions</p>
      <p>Seg–Sex: 09h00–12h30 | 14h00–18h00</p>
    </div>
    <div>
      <p><a href="politica-privacidade.html">Política de Privacidade</a></p>
      <p><a href="termos-utilizacao.html">Termos de Utilização</a></p>
    </div>
  </div>
</footer>

</body>
</html>
